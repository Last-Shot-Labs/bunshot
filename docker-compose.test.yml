services:
  redis:
    image: redis:7-alpine
    ports: ["6380:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      retries: 5
  mongo:
    image: mongo:7
    ports: ["27018:27017"]
    environment:
      MONGO_INITDB_DATABASE: bunshot_test
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 2s
      retries: 5
